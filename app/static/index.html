<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Control restaurante VINUS</title>
  <style>
    :root {
      --bg: #041a33;
      --bg-soft: #0a2a4f;
      --panel: #ffffff;
      --text: #0f2d48;
      --muted: #4d6b83;
      --accent: #0f4f86;
      --accent-strong: #0a3f6d;
      --line: #c9def1;
    }
    body {
      margin: 0;
      font-family: "Space Grotesk", "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at 15% 8%, rgba(34, 99, 166, 0.45), transparent 36%),
        radial-gradient(circle at 85% 18%, rgba(19, 57, 95, 0.65), transparent 40%),
        linear-gradient(180deg, var(--bg-soft), var(--bg));
      color: #e9f2fb;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 42px 42px;
      pointer-events: none;
    }
    body::after {
      content: "";
      position: fixed;
      width: 380px;
      height: 380px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(70, 149, 226, 0.3), transparent 72%);
      top: -120px;
      right: -80px;
      animation: drift 7s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes drift {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(20px); }
    }
    .card {
      background: var(--panel);
      padding: 2.2rem;
      border-radius: 20px;
      width: min(720px, 92vw);
      box-shadow: 0 24px 50px rgba(3, 22, 41, 0.45);
      border: 1px solid var(--line);
      position: relative;
      color: var(--text);
      animation: rise 0.55s ease;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 6px;
      background: linear-gradient(90deg, #0f4f86, #2f79bc, #0f4f86);
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.9rem;
      letter-spacing: 0.01em;
    }
    p {
      color: var(--muted);
      margin: 0 0 2rem;
    }
    .links {
      display: grid;
      gap: 1rem;
    }
    a {
      text-decoration: none;
      color: inherit;
    }
    .link-card {
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      background: linear-gradient(145deg, #ffffff, #eef5fc);
      border: 1px solid var(--line);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      opacity: 0;
      animation: fadeSlide 0.55s ease forwards;
    }
    .link-card:nth-child(1) { animation-delay: 0.14s; }
    .link-card:nth-child(2) { animation-delay: 0.24s; }
    .link-card.secondary {
      background: linear-gradient(145deg, #f8fbff, #e9f2fa);
    }
    .link-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(8, 48, 83, 0.2);
    }
    .link-title {
      font-weight: 700;
      margin-bottom: 0.35rem;
      color: #0e2f47;
    }
    .link-desc {
      color: var(--muted);
      font-size: 0.95rem;
    }
    .brand {
      display: inline-block;
      margin-bottom: 0.8rem;
      padding: 0.3rem 0.7rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      color: #ffffff;
      background: #0f4f86;
      border: 1px solid #1f6198;
      animation: softPulse 2.4s ease-in-out infinite;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes softPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(15, 79, 134, 0.25); }
      50% { box-shadow: 0 0 0 8px rgba(15, 79, 134, 0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="brand">VINUS CONCESION VIAS DEL NUS</span>
    <h1>Centro de Control de Tarjetas</h1>
    <p>Selecciona el modulo para monitorear el ingreso del personal operativo.</p>
    <div class="links">
      <a class="link-card" href="/control">
        <div class="link-title">Lectura de Tarjetas</div>
        <div class="link-desc">Pantalla publica para visualizar ingresos en tiempo real.</div>
      </a>
      <a class="link-card secondary" href="/admin/login">
        <div class="link-title">Administrador</div>
        <div class="link-desc">Registro de personal VINUS, filtros y exportacion.</div>
      </a>
    </div>
  </div>
</body>
</html>

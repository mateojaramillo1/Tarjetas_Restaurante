<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lectura de Tarjetas</title>
  <style>
    :root {
      --bg: #0b1120;
      --panel: #0f172a;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #f97316;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 0;
    }
    .card {
      background: rgba(15, 23, 42, 0.95);
      padding: 2rem;
      border-radius: 18px;
      width: min(900px, 94vw);
      box-shadow: 0 22px 44px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 0.5rem;
    }
    p {
      color: var(--muted);
      margin: 0 0 1.5rem;
    }
    .latest {
      background: rgba(249, 115, 22, 0.12);
      border: 1px solid rgba(249, 115, 22, 0.35);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-top: 1rem;
    }
    .status {
      margin-top: 1rem;
      border-radius: 12px;
      padding: 0.9rem 1rem;
      border: 1px solid transparent;
      font-weight: 600;
    }
    .status.ok {
      background: rgba(34, 197, 94, 0.12);
      border-color: rgba(34, 197, 94, 0.35);
      color: #bbf7d0;
    }
    .status.error {
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.35);
      color: #fecaca;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 0.8rem;
      margin-top: 0.75rem;
    }
    .field {
      background: rgba(15, 23, 42, 0.85);
      border-radius: 12px;
      padding: 0.75rem 0.9rem;
    }
    .label {
      color: var(--muted);
      font-size: 0.8rem;
    }
    .value {
      font-weight: 700;
      margin-top: 0.3rem;
    }
    .hidden {
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    a {
      color: var(--muted);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Lectura de Tarjetas</h1>
    <p>Acerque la tarjeta y el sistema mostrara la informacion.</p>

    <a href="/">Volver al inicio</a>

    <div class="status" id="readerStatus">Validando lector...</div>

    <div class="latest hidden" id="latest">
      <div class="value" id="latestTitle">Lectura</div>
      <div class="grid">
        <div class="field">
          <div class="label">Nombre</div>
          <div class="value" id="name">-</div>
        </div>
        <div class="field">
          <div class="label">Cedula</div>
          <div class="value" id="idNumber">-</div>
        </div>
        <div class="field">
          <div class="label">Telefono</div>
          <div class="value" id="phone">-</div>
        </div>
        <div class="field">
          <div class="label">Area</div>
          <div class="value" id="area">-</div>
        </div>
        <div class="field">
          <div class="label">UID</div>
          <div class="value" id="uid">-</div>
        </div>
        <div class="field">
          <div class="label">Hora</div>
          <div class="value" id="time">-</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let clearTimer = null;
    let baselineReadAt = null;

    function setReaderStatus(ok, message) {
      const statusEl = document.getElementById("readerStatus");
      statusEl.classList.remove("ok", "error");
      statusEl.classList.add(ok ? "ok" : "error");
      statusEl.textContent = message;
    }

    async function fetchHealth() {
      try {
        const res = await fetch("/api/health");
        const data = await res.json();
        if (data.status === "ok") {
          setReaderStatus(true, "Lector activo. Puede acercar la tarjeta.");
          return;
        }
        const readerError = data?.details?.reader_error || "Error desconocido en el lector.";
        setReaderStatus(false, `Lector no disponible: ${readerError}`);
      } catch (error) {
        setReaderStatus(false, "No se pudo validar el estado del lector.");
      }
    }

    async function pingControl() {
      try {
        await fetch("/api/control/ping", { method: "POST" });
      } catch (error) {
        // Ignorar error temporal de red
      }
    }

    function clearScreen() {
      document.getElementById("latest").classList.add("hidden");
      document.getElementById("name").textContent = "-";
      document.getElementById("idNumber").textContent = "-";
      document.getElementById("phone").textContent = "-";
      document.getElementById("area").textContent = "-";
      document.getElementById("uid").textContent = "-";
      document.getElementById("time").textContent = "-";
    }

    async function fetchLatest() {
      const res = await fetch("/api/latest");
      const data = await res.json();
      const latest = data.latest;
      if (!latest || !latest.read_at) {
        return;
      }
      if (latest.present === false) {
        clearScreen();
        return;
      }
      if (baselineReadAt === null) {
        baselineReadAt = latest.read_at;
      } else if (latest.read_at === baselineReadAt) {
        return;
      } else {
        baselineReadAt = latest.read_at;
      }

      const person = latest.person;
      const isRegistered = Boolean(person);
      const name = isRegistered ? `${person.first_name} ${person.last_name}` : "No registrado";
      const localTime = latest.read_at ? new Date(latest.read_at).toLocaleString() : "-";
      document.getElementById("latest").classList.remove("hidden");
      document.getElementById("latestTitle").textContent = isRegistered
        ? "Registro detectado"
        : "Tarjeta no registrada";
      document.getElementById("name").textContent = name;
      document.getElementById("idNumber").textContent = person?.id_number || "-";
      document.getElementById("phone").textContent = person?.phone || "-";
      document.getElementById("area").textContent = person?.area || "-";
      document.getElementById("uid").textContent = latest.uid || "-";
      document.getElementById("time").textContent = localTime;

      if (clearTimer) {
        clearTimeout(clearTimer);
      }
      clearTimer = setTimeout(clearScreen, 5000);
    }

    clearScreen();
    fetchHealth();
    pingControl();
    fetchLatest();
    setInterval(fetchHealth, 5000);
    setInterval(pingControl, 2000);
    setInterval(fetchLatest, 1200);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lectura de Tarjetas</title>
  <style>
    :root {
      --bg: #041a33;
      --panel: #ffffff;
      --text: #102d48;
      --muted: #4f6c83;
      --accent: #0f4f86;
      --line: #c9deef;
    }
    body {
      margin: 0;
      font-family: "Space Grotesk", "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(31, 92, 154, 0.45), transparent 38%),
        radial-gradient(circle at 78% 14%, rgba(18, 52, 86, 0.72), transparent 35%),
        var(--bg);
      color: #e9f2fb;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 0;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 42px 42px;
      pointer-events: none;
    }
    .card {
      background: var(--panel);
      padding: 2rem;
      border-radius: 20px;
      width: min(900px, 94vw);
      box-shadow: 0 24px 50px rgba(4, 23, 42, 0.5);
      border: 1px solid var(--line);
      color: var(--text);
      position: relative;
      animation: rise 0.55s ease;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 6px;
      background: linear-gradient(90deg, #0f4f86, #2f79bc, #0f4f86);
    }
    h1 {
      margin: 0 0 0.5rem;
    }
    p {
      color: var(--muted);
      margin: 0 0 1.5rem;
    }
    .latest {
      background: linear-gradient(140deg, #ffffff, #eef4fa);
      border: 1px solid #c4d9eb;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-top: 1rem;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .latest:not(.hidden) {
      animation: reveal 0.4s ease;
      transform: translateY(0);
      box-shadow: 0 12px 24px rgba(9, 47, 82, 0.12);
    }
    .latest::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(112deg, transparent 36%, rgba(56, 171, 255, 0.45) 50%, transparent 64%);
      transform: translateX(-130%);
      opacity: 0;
      pointer-events: none;
    }
    .latest.scan-hit {
      animation: reveal 0.2s ease, exoticHit 0.78s ease;
    }
    .latest.scan-hit::after {
      animation: scannerBeam 0.78s ease;
    }
    .status {
      margin-top: 1rem;
      border-radius: 12px;
      padding: 0.9rem 1rem;
      border: 1px solid transparent;
      font-weight: 600;
    }
    .status.ok {
      background: rgba(15, 79, 134, 0.12);
      border-color: rgba(15, 79, 134, 0.35);
      color: #0a3f6d;
    }
    .status.error {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.28);
      color: #b53030;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 0.8rem;
      margin-top: 0.75rem;
    }
    .field {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0.75rem 0.9rem;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .field:hover {
      transform: translateY(-1px);
      border-color: #93b8d8;
    }
    .label {
      color: var(--muted);
      font-size: 0.8rem;
    }
    .value {
      font-weight: 700;
      margin-top: 0.3rem;
    }
    #uid.scan-hit {
      animation: uidGlitch 0.55s ease;
      color: #0a3f6d;
    }
    .hidden {
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    a {
      color: var(--muted);
      text-decoration: none;
    }
    .brand {
      display: inline-block;
      margin-bottom: 0.7rem;
      padding: 0.26rem 0.68rem;
      border-radius: 999px;
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      color: #ffffff;
      background: #0f4f86;
      border: 1px solid #1f6198;
      animation: softPulse 2.4s ease-in-out infinite;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes reveal {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes exoticHit {
      0% { box-shadow: 0 0 0 rgba(12, 78, 132, 0); }
      35% { box-shadow: 0 0 0 8px rgba(34, 144, 227, 0.26), 0 0 32px rgba(34, 144, 227, 0.24); }
      100% { box-shadow: 0 12px 24px rgba(9, 47, 82, 0.12); }
    }
    @keyframes scannerBeam {
      0% { transform: translateX(-130%); opacity: 0.1; }
      45% { opacity: 0.85; }
      100% { transform: translateX(130%); opacity: 0; }
    }
    @keyframes uidGlitch {
      0% { transform: translateX(0); }
      25% { transform: translateX(-2px); }
      50% { transform: translateX(2px); }
      75% { transform: translateX(-1px); }
      100% { transform: translateX(0); }
    }
    @keyframes softPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(15, 79, 134, 0.25); }
      50% { box-shadow: 0 0 0 8px rgba(15, 79, 134, 0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="brand">VINUS CONCESION VIAS DEL NUS</span>
    <h1>Lectura de Tarjetas</h1>
    <p>Acerque la tarjeta y el sistema mostrara la informacion del personal de transporte.</p>

    <a href="/">Volver al inicio</a>

    <div class="status" id="readerStatus">Validando lector...</div>

    <div class="latest hidden" id="latest">
      <div class="value" id="latestTitle">Lectura</div>
      <div class="grid">
        <div class="field">
          <div class="label">Nombre</div>
          <div class="value" id="name">-</div>
        </div>
        <div class="field">
          <div class="label">Cedula</div>
          <div class="value" id="idNumber">-</div>
        </div>
        <div class="field">
          <div class="label">Telefono</div>
          <div class="value" id="phone">-</div>
        </div>
        <div class="field">
          <div class="label">Area</div>
          <div class="value" id="area">-</div>
        </div>
        <div class="field">
          <div class="label">UID</div>
          <div class="value" id="uid">-</div>
        </div>
        <div class="field">
          <div class="label">Hora</div>
          <div class="value" id="time">-</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let clearTimer = null;
    let baselineReadAt = null;

    function triggerReadFx() {
      const latestBox = document.getElementById("latest");
      const uidNode = document.getElementById("uid");
      latestBox.classList.remove("scan-hit");
      uidNode.classList.remove("scan-hit");
      void latestBox.offsetWidth;
      latestBox.classList.add("scan-hit");
      uidNode.classList.add("scan-hit");
      setTimeout(() => {
        latestBox.classList.remove("scan-hit");
        uidNode.classList.remove("scan-hit");
      }, 820);
    }

    function setReaderStatus(ok, message) {
      const statusEl = document.getElementById("readerStatus");
      statusEl.classList.remove("ok", "error");
      statusEl.classList.add(ok ? "ok" : "error");
      statusEl.textContent = message;
    }

    async function fetchHealth() {
      try {
        const res = await fetch("/api/health");
        const data = await res.json();
        if (data.status === "ok") {
          setReaderStatus(true, "Lector activo. Puede acercar la tarjeta.");
          return;
        }
        const readerError = data?.details?.reader_error || "Error desconocido en el lector.";
        setReaderStatus(false, `Lector no disponible: ${readerError}`);
      } catch (error) {
        setReaderStatus(false, "No se pudo validar el estado del lector.");
      }
    }

    async function pingControl() {
      try {
        await fetch("/api/control/ping", { method: "POST" });
      } catch (error) {
        // Ignorar error temporal de red
      }
    }

    function clearScreen() {
      document.getElementById("latest").classList.add("hidden");
      document.getElementById("name").textContent = "-";
      document.getElementById("idNumber").textContent = "-";
      document.getElementById("phone").textContent = "-";
      document.getElementById("area").textContent = "-";
      document.getElementById("uid").textContent = "-";
      document.getElementById("time").textContent = "-";
    }

    async function fetchLatest() {
      const res = await fetch("/api/latest");
      const data = await res.json();
      const latest = data.latest;
      if (!latest || !latest.read_at) {
        return;
      }
      if (latest.present === false) {
        clearScreen();
        return;
      }
      if (baselineReadAt === null) {
        baselineReadAt = latest.read_at;
      } else if (latest.read_at === baselineReadAt) {
        return;
      } else {
        baselineReadAt = latest.read_at;
      }

      const person = latest.person;
      const isRegistered = Boolean(person);
      const name = isRegistered ? `${person.first_name} ${person.last_name}` : "No registrado";
      const localTime = latest.read_at ? new Date(latest.read_at).toLocaleString() : "-";
      document.getElementById("latest").classList.remove("hidden");
      document.getElementById("latestTitle").textContent = isRegistered
        ? "Registro detectado"
        : "Tarjeta no registrada";
      document.getElementById("name").textContent = name;
      document.getElementById("idNumber").textContent = person?.id_number || "-";
      document.getElementById("phone").textContent = person?.phone || "-";
      document.getElementById("area").textContent = person?.area || "-";
      document.getElementById("uid").textContent = latest.uid || "-";
      document.getElementById("time").textContent = localTime;
      triggerReadFx();

      if (clearTimer) {
        clearTimeout(clearTimer);
      }
      clearTimer = setTimeout(clearScreen, 5000);
    }

    clearScreen();
    fetchHealth();
    pingControl();
    fetchLatest();
    setInterval(fetchHealth, 5000);
    setInterval(pingControl, 2000);
    setInterval(fetchLatest, 1200);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Administrador</title>
  <style>
    :root {
      --bg: #0b1120;
      --panel: #0f172a;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #f97316;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 0;
    }
    .card {
      background: rgba(15, 23, 42, 0.95);
      padding: 2rem;
      border-radius: 18px;
      width: min(860px, 94vw);
      box-shadow: 0 22px 44px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 0.5rem;
    }
    p {
      color: var(--muted);
      margin: 0 0 1.5rem;
    }
    .row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.25rem;
      margin-bottom: 1.2rem;
    }
    .row + .row {
      margin-top: 0.4rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    input {
      width: 100%;
      padding: 0.5rem 0.3rem;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(15, 23, 42, 0.85);
      color: var(--text);
    }
    input + input {
      margin-top: 0.2rem;
    }
    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .actions a {
      padding: 0.65rem 1rem;
      border-radius: 10px;
      border: none;
      background: var(--accent-2);
      color: #0b1120;
      font-weight: 700;
      text-decoration: none;
    }
    button {
      padding: 0.65rem 1rem;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #0b1120;
      font-weight: 700;
      cursor: pointer;
    }
    .secondary {
      background: var(--accent-2);
      color: #0b1120;
    }
    .status {
      margin-top: 1rem;
      color: var(--muted);
    }
    .uid-box {
      padding: 0.75rem 1rem;
      border-radius: 12px;
      background: rgba(56, 189, 248, 0.12);
      border: 1px solid rgba(56, 189, 248, 0.35);
      margin-bottom: 1rem;
    }
    .uid-value {
      font-weight: 700;
      font-size: 1.1rem;
    }
    .form-shell {
      padding: 1.4rem 1.8rem 1.6rem;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    .section {
      margin-top: 1.6rem;
    }
    .tabs {
      display: flex;
      gap: 0.75rem;
      margin: 1rem 0 0.6rem;
      flex-wrap: wrap;
    }
    .tab-btn {
      background: rgba(15, 23, 42, 0.7);
      color: var(--text);
      border: 1px solid rgba(148, 163, 184, 0.3);
    }
    .tab-btn.active {
      background: var(--accent);
      color: #0b1120;
      border-color: transparent;
    }
    .admin-panel {
      display: none;
    }
    .admin-panel.active {
      display: block;
    }
    .section h2 {
      margin: 0 0 0.5rem;
      font-size: 1.1rem;
    }
    .table-wrap {
      margin-top: 1rem;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      overflow: auto;
      background: rgba(15, 23, 42, 0.6);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th,
    td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid rgba(148, 163, 184, 0.15);
      text-align: left;
      white-space: nowrap;
    }
    th {
      color: var(--muted);
      font-weight: 600;
      background: rgba(15, 23, 42, 0.9);
    }
    .logout {
      margin-left: auto;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div>
        <h1>Administrador</h1>
        <p>Registro de personas e historial de lecturas.</p>
      </div>
      <span class="badge">Acceso seguro</span>
    </div>

    <div class="tabs">
      <button type="button" class="tab-btn active" id="tabRegister">Registro de empleados</button>
      <button type="button" class="tab-btn" id="tabHistory">Historial de lecturas</button>
    </div>

    <div class="section admin-panel active" id="registerPanel">
      <div class="uid-box">
        <div>UID detectado</div>
        <div class="uid-value" id="uidValue">-</div>
      </div>

      <form id="personForm" class="form-shell">
        <div class="row">
          <div>
            <label>Nombre</label>
            <input type="text" id="firstName" required />
          </div>
          <div>
            <label>Apellido</label>
            <input type="text" id="lastName" required />
          </div>
          <div>
            <label>Cedula</label>
            <input type="text" id="idNumber" required />
          </div>
        </div>
        <div class="row">
          <div>
            <label>Telefono</label>
            <input type="text" id="phone" />
          </div>
          <div>
            <label>Area/Cargo</label>
            <input type="text" id="area" />
          </div>
        </div>
        <div class="actions">
          <button type="submit">Guardar registro</button>
          <a class="secondary" id="exportControlBtn" href="/api/export.xlsx">Exportar Control</a>
          <a class="secondary" href="/api/export-people.xlsx">Exportar Personas</a>
          <a href="/" style="color: var(--muted);">Volver al inicio</a>
        </div>
        <div class="status" id="status"></div>
      </form>
    </div>

    <div class="section admin-panel" id="historyPanel">
      <h2>Historial de lecturas de tarjetas</h2>
      <p>Se muestran las lecturas mas recientes registradas en el control.</p>

      <div class="form-shell">
        <div class="row">
          <div>
            <label>Mes de corte</label>
            <input type="month" id="filterMonth" />
          </div>
          <div>
            <label>Desde</label>
            <input type="datetime-local" id="filterFrom" />
          </div>
          <div>
            <label>Hasta</label>
            <input type="datetime-local" id="filterTo" />
          </div>
          <div>
            <label>Nombre</label>
            <input type="text" id="filterName" placeholder="Nombre o apellido" />
          </div>
        </div>
        <div class="row">
          <div>
            <label>Cedula</label>
            <input type="text" id="filterDoc" placeholder="Cedula" />
          </div>
          <div>
            <label>Area/Cargo</label>
            <input type="text" id="filterArea" placeholder="Area/Cargo" />
          </div>
          <div>
            <label>UID</label>
            <input type="text" id="filterUid" placeholder="UID de tarjeta" />
          </div>
        </div>
      </div>

      <div class="actions" style="margin-top: 1rem;">
        <button type="button" id="searchAttendanceBtn">Buscar</button>
        <button type="button" class="secondary" id="clearAttendanceBtn">Limpiar</button>
      </div>
      <div class="status" id="searchStatus"></div>

      <div class="table-wrap">
        <table id="attendanceTable">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>UID</th>
              <th>Nombre</th>
              <th>Apellido</th>
              <th>Cedula</th>
              <th>Telefono</th>
              <th>Area</th>
              <th>ATR</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <form class="logout" method="post" action="/admin/logout">
      <button type="submit">Salir</button>
    </form>
  </div>

  <script>
    let latestUid = null;
    let lastFetchedUid = null;
    let baselineReadAt = null;
    let searchDebounceTimer = null;

    function resetScreen() {
      latestUid = null;
      lastFetchedUid = null;
      document.getElementById("uidValue").textContent = "-";
      document.getElementById("status").textContent = "";
      fillForm(null);
    }

    function fillForm(person) {
      document.getElementById("firstName").value = person?.first_name || "";
      document.getElementById("lastName").value = person?.last_name || "";
      document.getElementById("idNumber").value = person?.id_number || "";
      document.getElementById("phone").value = person?.phone || "";
      document.getElementById("area").value = person?.area || "";
    }

    async function loadPerson(uid) {
      if (!uid || uid === lastFetchedUid) {
        return;
      }
      lastFetchedUid = uid;
      const status = document.getElementById("status");
      status.textContent = "";
      const res = await fetch(`/api/people/${uid}`);
      if (res.status === 401) {
        status.textContent = "Sesion expirada. Vuelva a iniciar sesion.";
        fillForm(null);
        return;
      }
      if (res.status === 404) {
        status.textContent = "Tarjeta nueva. Complete los datos.";
        fillForm(null);
        return;
      }
      if (!res.ok) {
        status.textContent = "No se pudo cargar la persona.";
        return;
      }
      const data = await res.json();
      fillForm(data.person);
      status.textContent = "Persona encontrada. Puede actualizar datos.";
    }

    async function fetchLatest() {
      const res = await fetch("/api/latest");
      const data = await res.json();
      const latest = data.latest;
      if (!latest || !latest.uid || !latest.read_at) {
        return;
      }
      if (baselineReadAt === null) {
        baselineReadAt = latest.read_at;
      } else if (latest.read_at === baselineReadAt) {
        return;
      } else {
        baselineReadAt = latest.read_at;
      }

      latestUid = latest.uid;
      document.getElementById("uidValue").textContent = latest.uid;
      loadPerson(latest.uid);
      runSearch();
    }

    document.getElementById("personForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const status = document.getElementById("status");
      if (!latestUid) {
        status.textContent = "No se detecta UID. Acerque la tarjeta al lector.";
        return;
      }
      const payload = {
        uid: latestUid,
        first_name: document.getElementById("firstName").value.trim(),
        last_name: document.getElementById("lastName").value.trim(),
        id_number: document.getElementById("idNumber").value.trim(),
        phone: document.getElementById("phone").value.trim() || null,
        area: document.getElementById("area").value.trim() || null,
      };
      const res = await fetch("/api/people", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!res.ok) {
        status.textContent = "Error guardando el registro.";
        return;
      }
      status.textContent = "Registro guardado correctamente.";
      runSearch();
    });

    function renderAttendance(rows) {
      const tbody = document.querySelector("#attendanceTable tbody");
      tbody.innerHTML = "";
      rows.forEach((row) => {
        const tr = document.createElement("tr");
        const readAt = row.read_at ? new Date(row.read_at).toLocaleString() : "-";
        tr.innerHTML = `
          <td>${readAt}</td>
          <td>${row.uid || "-"}</td>
          <td>${row.first_name || "-"}</td>
          <td>${row.last_name || "-"}</td>
          <td>${row.id_number || "-"}</td>
          <td>${row.phone || "-"}</td>
          <td>${row.area || "-"}</td>
          <td>${row.atr || "-"}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function currentMonthValue() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
    }

    function buildAttendanceQuery(limit = 1000) {
      const params = new URLSearchParams();
      params.set("limit", String(limit));

      const monthValue = document.getElementById("filterMonth").value;
      const fromValue = document.getElementById("filterFrom").value;
      const toValue = document.getElementById("filterTo").value;
      const nameValue = document.getElementById("filterName").value.trim();
      const docValue = document.getElementById("filterDoc").value.trim();
      const areaValue = document.getElementById("filterArea").value.trim();
      const uidValue = document.getElementById("filterUid").value.trim();

      if (monthValue) params.set("month", monthValue);
      if (fromValue) params.set("from_dt", new Date(fromValue).toISOString());
      if (toValue) params.set("to_dt", new Date(toValue).toISOString());
      if (nameValue) params.set("name", nameValue);
      if (docValue) params.set("id_number", docValue);
      if (areaValue) params.set("area", areaValue);
      if (uidValue) params.set("uid", uidValue);

      return params;
    }

    function refreshExportControlLink() {
      const exportBtn = document.getElementById("exportControlBtn");
      exportBtn.href = `/api/export.xlsx?${buildAttendanceQuery(50000).toString()}`;
    }

    async function runSearch() {
      const status = document.getElementById("searchStatus");
      status.textContent = "";
      const res = await fetch(`/api/attendance?${buildAttendanceQuery(1000).toString()}`);
      if (res.status === 401) {
        status.textContent = "Sesion expirada. Vuelva a iniciar sesion.";
        renderAttendance([]);
        refreshExportControlLink();
        return;
      }
      if (!res.ok) {
        status.textContent = "No se pudo cargar el historial de lecturas.";
        renderAttendance([]);
        refreshExportControlLink();
        return;
      }
      const data = await res.json();
      const rows = data.attendance || [];
      renderAttendance(rows);
      status.textContent = `Lecturas encontradas: ${rows.length}`;
      refreshExportControlLink();
    }

    function clearAttendanceFilters() {
      document.getElementById("filterMonth").value = currentMonthValue();
      document.getElementById("filterFrom").value = "";
      document.getElementById("filterTo").value = "";
      document.getElementById("filterName").value = "";
      document.getElementById("filterDoc").value = "";
      document.getElementById("filterArea").value = "";
      document.getElementById("filterUid").value = "";
    }

    function scheduleSearch() {
      if (searchDebounceTimer) {
        clearTimeout(searchDebounceTimer);
      }
      searchDebounceTimer = setTimeout(() => {
        runSearch();
      }, 300);
    }

    function setActiveTab(tab) {
      const isRegister = tab === "register";
      document.getElementById("tabRegister").classList.toggle("active", isRegister);
      document.getElementById("tabHistory").classList.toggle("active", !isRegister);
      document.getElementById("registerPanel").classList.toggle("active", isRegister);
      document.getElementById("historyPanel").classList.toggle("active", !isRegister);
    }

    document.getElementById("searchAttendanceBtn").addEventListener("click", runSearch);
    document.getElementById("clearAttendanceBtn").addEventListener("click", () => {
      clearAttendanceFilters();
      runSearch();
    });
    document.getElementById("tabRegister").addEventListener("click", () => setActiveTab("register"));
    document.getElementById("tabHistory").addEventListener("click", () => setActiveTab("history"));

    ["filterMonth", "filterFrom", "filterTo", "filterName", "filterDoc", "filterArea", "filterUid"].forEach((id) => {
      const element = document.getElementById(id);
      element.addEventListener("input", scheduleSearch);
      element.addEventListener("change", scheduleSearch);
    });

    document.getElementById("filterMonth").value = currentMonthValue();
    resetScreen();
    fetchLatest();
    runSearch();
    setInterval(fetchLatest, 1200);
  </script>
</body>
</html>

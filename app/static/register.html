<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registro de Personas</title>
  <style>
    :root {
      --bg: #0b1120;
      --panel: #0f172a;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --outline: rgba(148, 163, 184, 0.3);
    }
    body {
      margin: 0;
      font-family: "Poppins", "Trebuchet MS", Tahoma, sans-serif;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.2), transparent 55%),
        radial-gradient(circle at 20% 20%, rgba(34, 197, 94, 0.12), transparent 40%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 0;
    }
    .card {
      background: linear-gradient(160deg, rgba(15, 23, 42, 0.95), rgba(17, 24, 39, 0.92));
      padding: 2.2rem;
      border-radius: 22px;
      width: min(820px, 92vw);
      box-shadow: 0 26px 50px rgba(3, 7, 18, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    h1 {
      margin: 0 0 0.35rem;
    }
    p {
      color: var(--muted);
      margin: 0 0 1.5rem;
    }
    .row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.25rem;
      margin-bottom: 1.2rem;
    }
    .row + .row {
      margin-top: 0.4rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    input {
      width: 100%;
      padding: 0.75rem 0.85rem;
      border-radius: 12px;
      border: 1px solid var(--outline);
      background: rgba(15, 23, 42, 0.85);
      color: var(--text);
    }
    input + input {
      margin-top: 0.2rem;
    }
    input:focus {
      outline: none;
      border-color: rgba(56, 189, 248, 0.7);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }
    .actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    button {
      padding: 0.7rem 1.1rem;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #0b1120;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover {
      filter: brightness(1.05);
    }
    .status {
      margin-top: 1rem;
      color: var(--muted);
    }
    .uid-box {
      padding: 0.9rem 1.1rem;
      border-radius: 14px;
      background: linear-gradient(120deg, rgba(56, 189, 248, 0.2), rgba(15, 23, 42, 0.2));
      border: 1px solid rgba(56, 189, 248, 0.4);
      margin-bottom: 1rem;
    }
    .uid-value {
      font-weight: 700;
      font-size: 1.1rem;
    }
    .form-shell {
      padding: 1.4rem 1.8rem 1.6rem;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Registro de Personas</h1>
    <p>Acerque la tarjeta al lector y complete los datos del trabajador.</p>

    <div class="uid-box">
      <div>UID detectado</div>
      <div class="uid-value" id="uidValue">-</div>
    </div>

    <form id="personForm" class="form-shell">
      <div class="row">
        <div>
          <label>Nombre</label>
          <input type="text" id="firstName" required />
        </div>
        <div>
          <label>Apellido</label>
          <input type="text" id="lastName" required />
        </div>
        <div>
          <label>Cedula</label>
          <input type="text" id="idNumber" required />
        </div>
      </div>
      <div class="row">
        <div>
          <label>Telefono</label>
          <input type="text" id="phone" />
        </div>
        <div>
          <label>Area/Cargo</label>
          <input type="text" id="area" />
        </div>
      </div>
      <div class="actions">
        <button type="submit">Guardar registro</button>
        <a href="/" style="color: var(--muted);">Volver al inicio</a>
      </div>
      <div class="status" id="status"></div>
    </form>
  </div>

  <script>
    let latestUid = null;
    let lastFetchedUid = null;
    let baselineReadAt = null;

    function resetScreen() {
      latestUid = null;
      lastFetchedUid = null;
      document.getElementById("uidValue").textContent = "-";
      document.getElementById("status").textContent = "";
      fillForm(null);
    }

    function fillForm(person) {
      document.getElementById("firstName").value = person?.first_name || "";
      document.getElementById("lastName").value = person?.last_name || "";
      document.getElementById("idNumber").value = person?.id_number || "";
      document.getElementById("phone").value = person?.phone || "";
      document.getElementById("area").value = person?.area || "";
    }

    async function loadPerson(uid) {
      if (!uid || uid === lastFetchedUid) {
        return;
      }
      lastFetchedUid = uid;
      const status = document.getElementById("status");
      status.textContent = "";
      const res = await fetch(`/api/people/${uid}`);
      if (res.status === 401) {
        status.textContent = "Acceso administrador requerido.";
        return;
      }
      if (res.status === 404) {
        status.textContent = "Tarjeta nueva. Complete los datos.";
        fillForm(null);
        return;
      }
      if (!res.ok) {
        status.textContent = "No se pudo cargar la persona.";
        return;
      }
      const data = await res.json();
      fillForm(data.person);
      status.textContent = "Persona encontrada. Puede actualizar datos.";
    }

    async function fetchLatest() {
      const res = await fetch("/api/latest");
      const data = await res.json();
      const latest = data.latest;
      if (!latest || !latest.uid || !latest.read_at) {
        return;
      }
      if (baselineReadAt === null) {
        baselineReadAt = latest.read_at;
        return;
      }
      if (latest.read_at === baselineReadAt) {
        return;
      }
      baselineReadAt = latest.read_at;
      latestUid = latest.uid;
      document.getElementById("uidValue").textContent = latest.uid;
      loadPerson(latest.uid);
    }

    document.getElementById("personForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const status = document.getElementById("status");
      if (!latestUid) {
        status.textContent = "No se detecta UID. Acerque la tarjeta al lector.";
        return;
      }
      const payload = {
        uid: latestUid,
        first_name: document.getElementById("firstName").value.trim(),
        last_name: document.getElementById("lastName").value.trim(),
        id_number: document.getElementById("idNumber").value.trim(),
        phone: document.getElementById("phone").value.trim() || null,
        area: document.getElementById("area").value.trim() || null,
      };
      const res = await fetch("/api/people", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!res.ok) {
        status.textContent = "Error guardando el registro.";
        return;
      }
      status.textContent = "Registro guardado correctamente.";
    });

    resetScreen();
    fetchLatest();
    setInterval(fetchLatest, 1200);
  </script>
</body>
</html>

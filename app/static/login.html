<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login Administrador</title>
  <style>
    :root {
      --bg: #041a33;
      --panel: #ffffff;
      --text: #102d48;
      --muted: #506d84;
      --accent: #0f4f86;
      --line: #c9deef;
    }
    body {
      margin: 0;
      font-family: "Space Grotesk", "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at 14% 10%, rgba(31, 92, 154, 0.48), transparent 36%),
        radial-gradient(circle at 82% 18%, rgba(18, 52, 86, 0.72), transparent 34%),
        var(--bg);
      color: #e9f2fb;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.2rem;
      position: relative;
      overflow: hidden;
    }
    body::after {
      content: "";
      position: fixed;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(78, 151, 219, 0.28), transparent 72%);
      right: -90px;
      top: -120px;
      pointer-events: none;
    }
    .card {
      background: var(--panel);
      padding: 2rem;
      border-radius: 20px;
      width: min(420px, 90vw);
      box-shadow: 0 24px 44px rgba(4, 23, 42, 0.5);
      border: 1px solid var(--line);
      color: var(--text);
      position: relative;
      animation: rise 0.55s ease;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 6px;
      background: linear-gradient(90deg, #0f4f86, #2f79bc);
    }
    h1 {
      margin: 0 0 0.5rem;
    }
    p {
      color: var(--muted);
      margin: 0 0 1.5rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    input {
      width: 100%;
      padding: 0.7rem 0.75rem;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #f5fbff;
      color: var(--text);
      margin-bottom: 1rem;
    }
    input:focus {
      outline: none;
      border-color: #0f4f86;
      box-shadow: 0 0 0 3px rgba(15, 79, 134, 0.18);
    }
    button {
      width: 100%;
      padding: 0.72rem 1rem;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #1a629f, #0a3f6d);
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    button::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 30%, rgba(255, 255, 255, 0.26) 50%, transparent 72%);
      transform: translateX(-120%);
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(8, 48, 83, 0.25);
    }
    button:hover::after {
      animation: shine 0.8s ease;
    }
    .status {
      margin-top: 0.8rem;
      color: #c53030;
      font-size: 0.9rem;
      min-height: 1.2rem;
    }
    a {
      display: block;
      margin-top: 1rem;
      color: var(--muted);
      text-align: center;
      text-decoration: none;
    }
    .brand {
      display: inline-block;
      margin-bottom: 0.7rem;
      padding: 0.26rem 0.68rem;
      border-radius: 999px;
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      color: #ffffff;
      background: #0f4f86;
      border: 1px solid #1f6198;
      animation: softPulse 2.4s ease-in-out infinite;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shine {
      from { transform: translateX(-120%); }
      to { transform: translateX(120%); }
    }
    @keyframes softPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(15, 79, 134, 0.25); }
      50% { box-shadow: 0 0 0 8px rgba(15, 79, 134, 0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="brand">VINUS CONCESION VIAS DEL NUS</span>
    <h1>Administrador</h1>
    <p>Ingresa la clave para gestionar el control operativo de transporte.</p>
    <form id="loginForm">
      <label>Clave</label>
      <input type="password" id="password" required />
      <button type="submit">Entrar</button>
    </form>
    <div class="status" id="status"></div>
    <a href="/">Volver al inicio</a>
  </div>
  <script>
    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const status = document.getElementById("status");
      status.textContent = "";
      const password = document.getElementById("password").value.trim();
      if (!password) {
        status.textContent = "Ingrese la clave.";
        return;
      }
      const body = new URLSearchParams();
      body.append("password", password);
      const res = await fetch("/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: body.toString(),
      });
      if (!res.ok) {
        status.textContent = "Clave incorrecta.";
        return;
      }
      const data = await res.json();
      window.location.href = data.redirect || "/admin";
    });
  </script>
</body>
</html>
